<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Dashboard</h1>

  <button onclick="loadPortfolio()">Load Portfolio</button>

  <h2>Add Holding</h2>

  <form id="holdingForm">
    <input type="text" id="coinName" placeholder="Coin Name" required>
    <input type="text" id="symbol" placeholder="Symbol" required>
    <input type="number" step="0.0001" id="quantityHeld" placeholder="Quantity" required>
    <input type="number" step="0.0001" id="buyPrice" placeholder="Buy Price" required>
    <input type="date" id="buyDate" required>
    <button type="submit">Add Holding</button>
  </form>

  <h2>My Portfolio</h2>

  <div id="portfolioContainer"></div>
</div>

<script src="app.js"></script>
</body>
</html>
